# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# The site URL path. For a user/organization site (USERNAME.github.io),
# this must be an empty string.
baseurl: ""

# The language of the webpage › http://www.lingoes.net/en/translator/langcode.htm
lang: en

# Change to your timezone › http://www.timezoneconverter.com/cgi-bin/findzone/findzone
timezone: America/New_York

# jekyll-seo-tag settings › https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md
# ↓ --------------------------

title: Alice Jayoung Jang # the main title

tagline: Assistant Professor, Business Information Technology, Virginia Tech # it will display as the sub-title

description: >- # used by seo meta and the atom feed
  Alice Jayoung Jang is an Assistant Professor of Business Information Technology
  at Virginia Tech, studying technology-mediated collective behavior, human-AI
  collaboration, and online communities.

# fill in the protocol & hostname for your site
url: "https://aj-jang.github.io"

github:
  username: aj-jang # change to your github username

twitter:
  username: # change to your twitter username

social:
  # Change to your full name.
  # It will be displayed as the default author of the posts and the copyright owner in the Footer
  name: Alice Jayoung Jang
  email: ajjang@vt.edu # change to your email address
  links:
    # The first element serves as the copyright owner's link
    - https://github.com/aj-jang
    # Uncomment below to add more social links
    # - https://www.linkedin.com/in/username
    # - https://scholar.google.com/citations?user=USERID

google_site_verification: # fill in to your verification string

# ↑ --------------------------
# The end of `jekyll-seo-tag` settings

google_analytics:
  id: # fill in your Google Analytics ID
  pv:
    proxy_endpoint:
    cache_path:

# Prefer color scheme setting.
#
# Note: Keep empty will follow the system prefer color by default,
# and there will be a toggle to switch the theme between dark and light
# on the bottom left of the sidebar.
#
# Available options:
#
#     light  - Use the light color scheme
#     dark   - Use the dark color scheme
#
theme_mode: light # [light|dark]

# The CDN endpoint for images.
img_cdn:

# the avatar on sidebar, support local or CORS resources
avatar: "/imgs/ajj_profile1.jpg"

# boolean type, the global switch for TOC in posts.
toc: true

comments:
  active: # The global switch for posts comments, e.g., 'disqus'. Keep it empty means disable
  disqus:
    shortname:
  utterances:
    repo:
    issue_term:
  giscus:
    repo:
    repo_id:
    category:
    category_id:
    mapping:
    input_position:
    lang:
    reactions_enabled:

# Self-hosted static assets, optional › https://github.com/cotes2020/chirpy-static-assets
assets:
  self_host:
    enabled: # boolean, keep empty means false
    env: # [development|production]

pwa:
  enabled: true # the option for PWA feature

paginate: 10

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    # default_lang: console
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs # see `site.collections`
    values:
      layout: page
      permalink: /:title/
  - scope:
      path: assets/img/favicons
    values:
      swcache: true
  - scope:
      path: assets/js/dist
    values:
      swcache: true

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - tools
  - README.md
  - CHANGELOG.md
  - LICENSE
  - rollup.config.js
  - node_modules
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
